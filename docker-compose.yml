services:
  toi-invite:
    build: .
    container_name: toi-invite
    restart: unless-stopped
    environment:
      - APP_BASE_URL=https://toi.night.enkiduck.com
      - DB_PATH=/data/toi.db
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      # Finik acquiring (real payments). All optional — absent means the
      # premium page stays a pure interest fake-door.
      - FINIK_API_KEY=${FINIK_API_KEY:-}
      - FINIK_ACCOUNT_ID=${FINIK_ACCOUNT_ID:-}
      - FINIK_PRIVATE_KEY_FILE=${FINIK_PRIVATE_KEY_FILE:-}
      # Finik's webhook-verification public key (from their support) — once
      # present, unsigned/forged webhooks are rejected outright.
      - FINIK_WEBHOOK_PUBLIC_KEY_FILE=${FINIK_WEBHOOK_PUBLIC_KEY_FILE:-}
    volumes:
      - toi-data:/data
      # RSA key whose public half is registered with Finik; never in the image.
      - /home/agent/.config/toi-finik:/keys:ro
    networks: [web]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.toi-invite.rule=Host(`toi.night.enkiduck.com`)"
      - traefik.http.routers.toi-invite.entrypoints=websecure
      - traefik.http.routers.toi-invite.tls.certresolver=le
      - traefik.http.routers.toi-invite.middlewares=toi-invite-bodylimit
      # Hard request-body ceiling at the edge: photo uploads are ≤5MB; chunked
      # bodies without Content-Length can't bypass the app-level check.
      - traefik.http.middlewares.toi-invite-bodylimit.buffering.maxRequestBodyBytes=8000000
      - traefik.http.services.toi-invite.loadbalancer.server.port=3000

networks:
  web:
    external: true

volumes:
  toi-data:
