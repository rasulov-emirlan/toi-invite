# pnpm 11: build-script allowlist lives here (the package.json "pnpm" section is
# ignored). better-sqlite3 has a native postinstall; esbuild/sharp fetch their
# platform binaries. Allow them so install compiles/links the native bits.
allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  ffmpeg-static: true
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
  - ffmpeg-static
